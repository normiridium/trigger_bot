<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Триггеры</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/trigger_bot/static/trigger_list.css" rel="stylesheet">
</head>
<body class="text-light">
<div class="container-fluid py-4 app" x-data="triggerApp()" x-init="initTriggerPage()">
  <div class="d-flex flex-wrap align-items-center gap-2 mb-3 trigger-toolbar"></div>

  <ul class="nav nav-tabs mb-3" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="tab-triggers" data-bs-toggle="tab" data-bs-target="#tab-triggers-pane" type="button" role="tab" aria-controls="tab-triggers-pane" aria-selected="true">Триггеры</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-templates" data-bs-toggle="tab" data-bs-target="#tab-templates-pane" type="button" role="tab" aria-controls="tab-templates-pane" aria-selected="false">Шаблоны</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-settings" data-bs-toggle="tab" data-bs-target="#tab-settings-pane" type="button" role="tab" aria-controls="tab-settings-pane" aria-selected="false">Настройки</button>
    </li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="tab-triggers-pane" role="tabpanel" aria-labelledby="tab-triggers">
      <div class="d-flex align-items-center justify-content-end mb-2">
        <button class="btn btn-success btn-sm" type="button" x-on:click="openNew()"><i class="bi bi-plus-lg"></i> Новый триггер</button>
      </div>
      <div class="table-responsive rounded border border-secondary-subtle">
        <table class="table table-dark table-striped table-hover align-middle mb-0 trigger-table">
          <thead>
            <tr><th></th><th>Название</th><th>Условие</th><th>Режим</th><th class="text-nowrap">Управление</th></tr>
          </thead>
          <tbody id="triggers_tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="tab-pane fade" id="tab-templates-pane" role="tabpanel" aria-labelledby="tab-templates">
      <div class="d-flex align-items-center justify-content-end mb-2">
        <button class="btn btn-success btn-sm" type="button" x-on:click="openTemplateNew()"><i class="bi bi-plus-lg"></i> Новый шаблон</button>
      </div>
      <div class="table-responsive rounded border border-secondary-subtle">
        <table class="table table-dark table-striped table-hover align-middle mb-0 templates-table">
          <thead>
            <tr>
              <th class="col-key">Идентификатор</th>
              <th class="col-title">Название</th>
              <th class="col-text">Шаблон</th>
              <th class="text-nowrap col-action">Действие</th>
            </tr>
          </thead>
          <tbody id="templates_tbody">
            <tr><td colspan="4" class="text-center text-secondary py-4">Загрузка…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="tab-pane fade" id="tab-settings-pane" role="tabpanel" aria-labelledby="tab-settings">
      <div class="p-3 rounded border border-secondary-subtle settings-panel">
        <h6 class="mb-3">Импорт/экспорт (триггеры + шаблоны)</h6>
        <form method="post" action="/trigger_bot/import" class="d-flex flex-column gap-2 import-actions" data-submit-btn="import_submit_btn" x-on:submit="handleImportSubmit($event, $event.currentTarget)">
          <div class="import-file-wrap">
            <input class="d-none" type="file" name="file" id="import_file" accept="application/json" data-output="import_file_name" x-on:change="updateImportFileName($event.target)">
            <label class="import-file-btn" for="import_file">Выберите файл</label>
            <span class="import-file-name" id="import_file_name">Файл не выбран</span>
          </div>
          <div class="d-flex flex-wrap gap-2">
            <button class="btn btn-secondary" type="submit" id="import_submit_btn"><i class="bi bi-upload"></i> Импорт JSON</button>
            <a class="btn btn-primary" id="export_link" href="/trigger_bot/export"><i class="bi bi-download"></i> Экспорт JSON</a>
          </div>
        </form>
      </div>
      <div class="p-3 rounded border border-secondary-subtle settings-panel mt-3">
        <h6 class="mb-2">Настройки из .env</h6>
        <div class="text-secondary small mb-3">Пароли и ключи доступа здесь не отображаются. Изменения вступают в силу после перезапуска сервиса.</div>
        <form id="settings_form" class="d-flex flex-column gap-2">
          <div id="settings_fields" class="d-flex flex-column gap-2"></div>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-success btn-sm" type="submit" id="settings_save_btn"><i class="bi bi-floppy"></i> Сохранить настройки</button>
            <button class="btn btn-danger btn-sm" type="button" id="settings_restart_btn"><i class="bi bi-arrow-clockwise"></i> Перезапуск сервиса</button>
            <span class="text-secondary small" id="settings_save_hint"></span>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="triggerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-fullscreen-md-down">
    <div class="modal-content bg-dark text-light border-secondary">
      <form method="post" action="/trigger_bot/save" id="trigger_form" x-on:submit="submitTriggerForm($event)">
      <div class="modal-header border-secondary">
        <h5 class="modal-title me-3">Триггер</h5>
        <div class="ms-auto d-flex align-items-center gap-3">
          <input type="hidden" name="enabled" id="f_enabled" value="1">
          <div class="form-check form-switch enabled-switch-head m-0">
            <input class="form-check-input" type="checkbox" role="switch" id="f_enabled_switch" x-on:change="syncSwitch('f_enabled')" title="Включен" aria-label="Включен">
            <label class="form-check-label" for="f_enabled_switch">Включен</label>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
      </div>
        <div class="modal-body">
          <input type="hidden" name="id" id="f_id">
          <input type="hidden" name="uid" id="f_uid">

          <div class="mb-3">
            <label class="form-label">Название</label>
            <input class="form-control bg-black text-light border-secondary" type="text" name="title" id="f_title">
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Режим триггера</label>
              <div class="dropdown w-100">
                <input type="hidden" name="trigger_mode" id="f_trigger_mode" value="all">
                <button class="btn btn-outline-secondary dropdown-toggle w-100 text-start" type="button" id="f_trigger_mode_btn" data-bs-toggle="dropdown" aria-expanded="false">
                  Загрузка...
                </button>
                <ul class="dropdown-menu w-100" id="f_trigger_mode_menu"></ul>
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Режим админов</label>
              <div class="dropdown w-100">
                <input type="hidden" name="admin_mode" id="f_admin_mode" value="anybody">
                <button class="btn btn-outline-secondary dropdown-toggle w-100 text-start" type="button" id="f_admin_mode_btn" data-bs-toggle="dropdown" aria-expanded="false">
                  Загрузка...
                </button>
                <ul class="dropdown-menu w-100" id="f_admin_mode_menu"></ul>
              </div>
            </div>

            <div class="col-md-6" id="match_text_col">
              <label class="form-label" id="f_match_text_label">Текст триггера</label>
              <div class="match-text-wrap">
                <input class="match-text-control" type="text" name="match_text" id="f_match_text" placeholder="Текст триггера">
                <textarea class="match-text-control d-none" rows="6" id="f_match_text_area" placeholder="Текст триггера"></textarea>
                <button class="match-text-toggle" type="button" title="Развернуть" id="match_text_toggle">
                  <i class="bi bi-textarea-resize"></i>
                </button>
              </div>
            </div>
            <div class="col-md-6" id="match_type_col">
              <label class="form-label">Тип условия</label>
              <div class="dropdown w-100">
                <input type="hidden" name="match_type" id="f_match_type" value="full">
                <button class="btn btn-outline-secondary dropdown-toggle w-100 text-start" type="button" id="f_match_type_btn" data-bs-toggle="dropdown" aria-expanded="false">
                  Загрузка...
                </button>
                <ul class="dropdown-menu w-100" id="f_match_type_menu"></ul>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Тип действия</label>
              <div class="dropdown w-100">
                <input type="hidden" name="action_type" id="f_action_type" value="send">
                <button class="btn btn-outline-secondary dropdown-toggle w-100 text-start" type="button" id="f_action_type_btn" data-bs-toggle="dropdown" aria-expanded="false">
                  Загрузка...
                </button>
                <ul class="dropdown-menu w-100" id="f_action_type_menu"></ul>
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Шанс (1-100)</label>
              <input class="form-control bg-black text-light border-secondary" type="number" name="chance" min="1" max="100" id="f_chance">
            </div>

            <div class="col-12">
              <div class="row g-3">
                <div class="col-12 col-sm-6 col-lg-3">
                  <input type="hidden" name="case_sensitive" id="f_case_sensitive" value="0">
                  <div class="form-check form-switch mt-1">
                    <input class="form-check-input" type="checkbox" role="switch" id="f_case_sensitive_switch" x-on:change="syncSwitch('f_case_sensitive')">
                    <label class="form-check-label" for="f_case_sensitive_switch">Учитывать регистр</label>
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-3">
                  <input type="hidden" name="reply" id="f_reply" value="1">
                  <div class="form-check form-switch mt-1">
                    <input class="form-check-input" type="checkbox" role="switch" id="f_reply_switch" x-on:change="syncSwitch('f_reply')">
                    <label class="form-check-label" for="f_reply_switch">Отправлять reply</label>
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-3">
                  <input type="hidden" name="preview" id="f_preview" value="0">
                  <div class="form-check form-switch mt-1">
                    <input class="form-check-input" type="checkbox" role="switch" id="f_preview_switch" x-on:change="syncSwitch('f_preview')">
                    <label class="form-check-label" for="f_preview_switch">Превью ссылки</label>
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-3">
                  <input type="hidden" name="delete_source" id="f_delete_source" value="0">
                  <div class="form-check form-switch mt-1">
                    <input class="form-check-input" type="checkbox" role="switch" id="f_delete_source_switch" x-on:change="syncSwitch('f_delete_source')">
                    <label class="form-check-label" for="f_delete_source_switch">Удалить исход. сообщение</label>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="d-flex flex-wrap align-items-center gap-1 mb-1 mini-toolbar">
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;b&gt;" data-after="&lt;/b&gt;" title="Жирный"><i class="bi bi-type-bold"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;i&gt;" data-after="&lt;/i&gt;" title="Курсив"><i class="bi bi-type-italic"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;u&gt;" data-after="&lt;/u&gt;" title="Подчеркивание"><i class="bi bi-type-underline"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;s&gt;" data-after="&lt;/s&gt;" title="Зачеркнутый"><i class="bi bi-type-strikethrough"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;code&gt;" data-after="&lt;/code&gt;" title="Код"><i class="bi bi-code-square"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;pre&gt;" data-after="&lt;/pre&gt;" title="Блок кода"><i class="bi bi-braces"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;blockquote&gt;" data-after="&lt;/blockquote&gt;" title="Цитата"><i class="bi bi-blockquote-left"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="link" title="Ссылка"><i class="bi bi-link-45deg"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;tg-spoiler&gt;" data-after="&lt;/tg-spoiler&gt;" title="Спойлер"><i class="bi bi-eye-slash"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-action="emoji" title="Кастомный эмодзи Telegram"><i class="bi bi-emoji-smile"></i></button>
                <select class="form-select form-select-sm bg-black text-light border-secondary template-insert-picker" id="f_template_picker">
                  <option value="">Вставить шаблон…</option>
                </select>
                <select class="form-select form-select-sm bg-black text-light border-secondary ms-auto template-tag-picker" id="f_template_tag_picker">
                  <option value="">Вставить тег сообщения…</option>
                </select>
              </div>
              <div id="response_editor" class="cm-wrap mb-2"></div>
              <textarea class="form-control bg-black text-light border-secondary" rows="9" name="response_text" id="f_response_text" placeholder="Текст ответа / промпт"></textarea>
              <div id="response_variant_controls" class="response-variant-controls mt-2"></div>
            </div>
          </div>
        </div>
        <div class="modal-footer border-secondary">
          <button class="btn btn-success" type="submit" id="f_save_btn"><i class="bi bi-floppy"></i> Сохранить</button>
          <button class="btn btn-outline-info" type="button" id="f_clone_btn" x-on:click="cloneCurrentTrigger()"><i class="bi bi-copy"></i> Клонировать</button>
          <button class="btn btn-outline-light" type="button" data-bs-dismiss="modal">Закрыть</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="templateModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-fullscreen-md-down">
    <div class="modal-content bg-dark text-light border-secondary">
      <form method="post" action="/trigger_bot/template_save" id="template_form" x-on:submit="submitTemplateForm($event)">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Шаблон</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" name="id" id="tpl_id">
        <div class="mb-3">
          <label class="form-label">Идентификатор</label>
          <input class="form-control bg-black text-light border-secondary" type="text" name="key" id="tpl_key" placeholder="welcome_short">
        </div>
        <div class="mb-3">
          <label class="form-label">Название</label>
          <input class="form-control bg-black text-light border-secondary" type="text" name="title" id="tpl_title" placeholder="Приветствие (кратко)">
        </div>
        <div class="mb-3">
          <label class="form-label">Текст шаблона</label>
          <div class="mini-toolbar d-flex flex-wrap gap-1 align-items-center mb-2" data-target="template">
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;b&gt;" data-after="&lt;/b&gt;" title="Жирный"><i class="bi bi-type-bold"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;i&gt;" data-after="&lt;/i&gt;" title="Курсив"><i class="bi bi-type-italic"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;u&gt;" data-after="&lt;/u&gt;" title="Подчеркивание"><i class="bi bi-type-underline"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;s&gt;" data-after="&lt;/s&gt;" title="Зачеркнутый"><i class="bi bi-type-strikethrough"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;code&gt;" data-after="&lt;/code&gt;" title="Код"><i class="bi bi-code-square"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;pre&gt;" data-after="&lt;/pre&gt;" title="Блок кода"><i class="bi bi-braces"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;blockquote&gt;" data-after="&lt;/blockquote&gt;" title="Цитата"><i class="bi bi-blockquote-left"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="link" title="Ссылка"><i class="bi bi-link-45deg"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="wrap" data-before="&lt;tg-spoiler&gt;" data-after="&lt;/tg-spoiler&gt;" title="Спойлер"><i class="bi bi-eye-slash"></i></button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-action="emoji" title="Кастомный эмодзи Telegram"><i class="bi bi-emoji-smile"></i></button>
            <select class="form-select form-select-sm bg-black text-light border-secondary ms-auto template-tag-picker" id="tpl_template_tag_picker">
              <option value="">Вставить тег сообщения…</option>
            </select>
          </div>
          <textarea class="form-control bg-black text-light border-secondary" rows="8" name="text" id="tpl_text" placeholder="Текст ответа..."></textarea>
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button class="btn btn-success" type="submit"><i class="bi bi-save"></i> Сохранить</button>
        <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Закрыть</button>
      </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script type="module" src="/trigger_bot/static/trigger_codemirror.js"></script>
<script src="/trigger_bot/static/trigger_list.js"></script>
</body>
</html>
