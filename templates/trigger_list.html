<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Триггеры</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #111827; }
    .app { max-width: 1280px; }
    .table code { font-size: .9rem; }
    .mini-toolbar .btn,
    .mini-toolbar .form-select {
      font-size: .75rem;
      padding: .15rem .35rem;
      line-height: 1.2;
    }
    .mini-toolbar .btn i {
      font-size: .8rem;
    }
  </style>
</head>
<body class="text-light">
<div class="container-fluid py-4 app">
  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <h3 class="m-0 me-auto">Триггеры</h3>
    <button class="btn btn-success" type="button" onclick="openNew()"><i class="bi bi-plus-lg"></i> Новый</button>
    <a class="btn btn-primary" id="export_link" href="/trigger_bot/export"><i class="bi bi-download"></i> Экспорт</a>
  </div>

  <form method="post" action="/trigger_bot/import" enctype="multipart/form-data" class="row g-2 mb-3">
    <div class="col-auto"><input class="form-control" type="file" name="file" accept="application/json"></div>
    <div class="col-auto"><button class="btn btn-secondary" type="submit"><i class="bi bi-upload"></i> Импорт JSON</button></div>
  </form>

  <div class="table-responsive rounded border border-secondary-subtle">
    <table class="table table-dark table-striped table-hover align-middle mb-0">
      <thead>
        <tr><th>ID</th><th>Название</th><th>Условие</th><th>Режим</th><th>Статус</th><th class="text-nowrap">Управление</th></tr>
      </thead>
      <tbody>
        {{range .Items}}
        <tr>
          <td>{{.ID}}</td>
          <td>{{.Title}}</td>
          <td><code>{{.MatchText}}</code> <small>({{.MatchType}})</small></td>
          <td><small>{{.ActionType}} / {{.AdminMode}}</small></td>
          <td>
            <span class="badge {{statusClass .Enabled}}">{{statusText .Enabled}}</span>
            {{if .RegexError}}<i class="bi bi-exclamation-triangle-fill text-danger ms-1" title="{{.RegexError}}"></i>{{end}}
          </td>
          <td class="text-nowrap">
            <button class="btn btn-sm btn-outline-primary" type="button" onclick="openEdit({{.ID}})" title="Редактировать" aria-label="Редактировать"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-info ms-1" type="button" onclick="openClone({{.ID}})" title="Клонировать" aria-label="Клонировать"><i class="bi bi-copy"></i></button>
            <form class="d-inline ms-1" method="post" action="/trigger_bot/toggle"><input type="hidden" name="id" value="{{.ID}}"><button class="btn btn-sm btn-outline-warning" type="submit" title="Вкл/Выкл" aria-label="Вкл/Выкл"><i class="bi bi-power"></i></button></form>
            <form class="d-inline ms-1" method="post" action="/trigger_bot/delete" onsubmit="return confirm('Удалить?')"><input type="hidden" name="id" value="{{.ID}}"><button class="btn btn-sm btn-outline-danger" type="submit" title="Удалить" aria-label="Удалить"><i class="bi bi-x-lg"></i></button></form>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="triggerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content bg-dark text-light border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Триггер</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form method="post" action="/trigger_bot/save">
        <div class="modal-body">
          <input type="hidden" name="id" id="f_id">

          <div class="mb-3">
            <label class="form-label">Название</label>
            <input class="form-control bg-black text-light border-secondary" type="text" name="title" id="f_title">
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Режим триггера</label>
              <select class="form-select bg-black text-light border-secondary" name="trigger_mode" id="f_trigger_mode">
                <option value="all">Все сообщения</option>
                <option value="only_replies">Только реплаи</option>
                <option value="only_replies_to_any_bot">Только реплаи на любого бота</option>
                <option value="only_replies_to_combot">Реплай к боту триггера</option>
                <option value="never_on_replies">Не срабатывать на реплаи</option>
                <option value="command_reply">Режим команд (действие в ответ)</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Режим админов</label>
              <select class="form-select bg-black text-light border-secondary" name="admin_mode" id="f_admin_mode">
                <option value="anybody">Любой участник</option>
                <option value="admins">Только админы</option>
                <option value="not_admins">Кроме админов</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label" id="f_match_text_label">Текст триггера</label>
              <input class="form-control bg-black text-light border-secondary" type="text" name="match_text" id="f_match_text" placeholder="Текст триггера">
            </div>
            <div class="col-md-6">
              <label class="form-label">Тип условия</label>
              <select class="form-select bg-black text-light border-secondary" name="match_type" id="f_match_type">
                <option value="idle">Простой вызова бота</option>
                <option value="full">Полное совпадение</option>
                <option value="partial">Частичное совпадение</option>
                <option value="regex">Регулярное выражение</option>
                <option value="starts">Начинается с</option>
                <option value="ends">Заканчивается на</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Тип действия</label>
              <select class="form-select bg-black text-light border-secondary" name="action_type" id="f_action_type">
                <option value="send">Отправить сообщение</option>
                <option value="delete">Удалить сообщение</option>
                <option value="gpt_prompt">Промпт в ChatGPT</option>
                <option value="gpt_image">Сгенерировать картинку (ChatGPT)</option>
                <option value="search_image">Найти картинку (по запросу)</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Шанс (1-100)</label>
              <input class="form-control bg-black text-light border-secondary" type="number" name="chance" min="1" max="100" id="f_chance">
            </div>

            <div class="col-12">
              <div class="row g-3">
                <div class="col-12 col-sm-6 col-lg-3">
                  <input type="hidden" name="enabled" id="f_enabled" value="1">
                  <div class="form-check form-switch mt-1">
                    <input class="form-check-input" type="checkbox" role="switch" id="f_enabled_switch" onchange="syncSwitch('f_enabled')">
                    <label class="form-check-label" for="f_enabled_switch">Включен</label>
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-3">
                  <input type="hidden" name="case_sensitive" id="f_case_sensitive" value="0">
                  <div class="form-check form-switch mt-1">
                    <input class="form-check-input" type="checkbox" role="switch" id="f_case_sensitive_switch" onchange="syncSwitch('f_case_sensitive')">
                    <label class="form-check-label" for="f_case_sensitive_switch">Учитывать регистр</label>
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-3">
                  <input type="hidden" name="reply" id="f_reply" value="1">
                  <div class="form-check form-switch mt-1">
                    <input class="form-check-input" type="checkbox" role="switch" id="f_reply_switch" onchange="syncSwitch('f_reply')">
                    <label class="form-check-label" for="f_reply_switch">Отправлять reply</label>
                  </div>
                </div>
                <div class="col-12 col-sm-6 col-lg-3">
                  <input type="hidden" name="preview" id="f_preview" value="0">
                  <div class="form-check form-switch mt-1">
                    <input class="form-check-input" type="checkbox" role="switch" id="f_preview_switch" onchange="syncSwitch('f_preview')">
                    <label class="form-check-label" for="f_preview_switch">Превью ссылки</label>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">Текст ответа / промпт (для ChatGPT можно использовать {{"{{message}}"}})</label>
              <div class="d-flex flex-wrap align-items-center gap-1 mb-1 mini-toolbar">
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="wrapResponseSelection('<b>','</b>')" title="Жирный"><i class="bi bi-type-bold"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="wrapResponseSelection('<i>','</i>')" title="Курсив"><i class="bi bi-type-italic"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="wrapResponseSelection('<u>','</u>')" title="Подчеркивание"><i class="bi bi-type-underline"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="wrapResponseSelection('<s>','</s>')" title="Зачеркнутый"><i class="bi bi-type-strikethrough"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="wrapResponseSelection('<code>','</code>')" title="Код"><i class="bi bi-code-square"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="wrapResponseSelection('<pre>','</pre>')" title="Блок кода"><i class="bi bi-braces"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="insertResponseLink()" title="Ссылка"><i class="bi bi-link-45deg"></i></button>
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="wrapResponseSelection('<tg-spoiler>','</tg-spoiler>')" title="Спойлер"><i class="bi bi-eye-slash"></i></button>
                <select class="form-select form-select-sm bg-black text-light border-secondary ms-auto" id="f_template_tag_picker" style="max-width: 320px;" onchange="insertTemplateTagFromPicker(this)">
                  <option value="">Вставить тег сообщения…</option>
                  <option value='{{"{{message}}"}}'>{{"{{message}}"}} — текст сообщения</option>
                  <option value='{{"{{user_text}}"}}'>{{"{{user_text}}"}}</option>
                  <option value='{{"{{capturing_text}}"}}'>{{"{{capturing_text}}"}} — захват regex</option>
                  <option value='{{"{{user_id}}"}}'>{{"{{user_id}}"}}</option>
                  <option value='{{"{{user_first_name}}"}}'>{{"{{user_first_name}}"}}</option>
                  <option value='{{"{{user_username}}"}}'>{{"{{user_username}}"}}</option>
                  <option value='{{"{{user_display_name}}"}}'>{{"{{user_display_name}}"}}</option>
                  <option value='{{"{{user_label}}"}}'>{{"{{user_label}}"}}</option>
                  <option value='{{"{{sender_tag}}"}}'>{{"{{sender_tag}}"}}</option>
                  <option value='{{"{{chat_id}}"}}'>{{"{{chat_id}}"}}</option>
                  <option value='{{"{{chat_title}}"}}'>{{"{{chat_title}}"}}</option>
                  <option value='{{"{{reply_text}}"}}'>{{"{{reply_text}}"}}</option>
                  <option value='{{"{{reply_user_id}}"}}'>{{"{{reply_user_id}}"}}</option>
                  <option value='{{"{{reply_first_name}}"}}'>{{"{{reply_first_name}}"}}</option>
                  <option value='{{"{{reply_username}}"}}'>{{"{{reply_username}}"}}</option>
                  <option value='{{"{{reply_display_name}}"}}'>{{"{{reply_display_name}}"}}</option>
                  <option value='{{"{{reply_label}}"}}'>{{"{{reply_label}}"}}</option>
                  <option value='{{"{{reply_sender_tag}}"}}'>{{"{{reply_sender_tag}}"}}</option>
                </select>
              </div>
              <textarea class="form-control bg-black text-light border-secondary" rows="9" name="response_text" id="f_response_text"></textarea>
            </div>
          </div>
        </div>
        <div class="modal-footer border-secondary">
          <button class="btn btn-success" type="submit"><i class="bi bi-floppy"></i> Сохранить</button>
          <button class="btn btn-outline-light" type="button" data-bs-dismiss="modal">Закрыть</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function setSel(id,val){const el=document.getElementById(id); if(el && val!=null){el.value=String(val)}}
function getResponseTextArea(){
  return document.getElementById('f_response_text');
}
function replaceTextAreaSelection(el, before, after){
  if(!el){ return; }
  const start = el.selectionStart ?? 0;
  const end = el.selectionEnd ?? 0;
  const val = el.value ?? '';
  const selected = val.slice(start, end) || 'текст';
  const next = val.slice(0, start) + before + selected + after + val.slice(end);
  el.value = next;
  const caret = start + before.length + selected.length + after.length;
  el.focus();
  el.setSelectionRange(caret, caret);
}
function insertTextAtCursor(el, text){
  if(!el){ return; }
  const start = el.selectionStart ?? 0;
  const end = el.selectionEnd ?? 0;
  const val = el.value ?? '';
  el.value = val.slice(0, start) + text + val.slice(end);
  const caret = start + text.length;
  el.focus();
  el.setSelectionRange(caret, caret);
}
function wrapResponseSelection(before, after){
  replaceTextAreaSelection(getResponseTextArea(), before, after);
}
function insertResponseLink(){
  const url = prompt('URL ссылки', 'https://');
  if(!url){ return; }
  const el = getResponseTextArea();
  if(!el){ return; }
  const start = el.selectionStart ?? 0;
  const end = el.selectionEnd ?? 0;
  const val = el.value ?? '';
  const selected = val.slice(start, end) || 'ссылка';
  const linked = `<a href="${url}">${selected}</a>`;
  el.value = val.slice(0, start) + linked + val.slice(end);
  const caret = start + linked.length;
  el.focus();
  el.setSelectionRange(caret, caret);
}
function insertTemplateTagFromPicker(sel){
  if(!sel || !sel.value){ return; }
  insertTextAtCursor(getResponseTextArea(), sel.value);
  sel.value = '';
}
function applyMatchTypeUI(){
  const mt = document.getElementById('f_match_type');
  const lbl = document.getElementById('f_match_text_label');
  const inp = document.getElementById('f_match_text');
  const cs = document.getElementById('f_case_sensitive_switch');
  const csHidden = document.getElementById('f_case_sensitive');
  if(!mt || !lbl || !inp){ return; }
  if(mt.value === 'idle'){
    lbl.textContent = 'Время простоя (мин)';
    inp.type = 'number';
    inp.min = '1';
    inp.step = '1';
    inp.placeholder = 'например, 120';
    if(cs){ cs.disabled = true; cs.checked = false; }
    if(csHidden){ csHidden.value = '0'; }
  } else {
    lbl.textContent = 'Текст триггера';
    inp.type = 'text';
    inp.removeAttribute('min');
    inp.removeAttribute('step');
    inp.placeholder = 'Текст триггера';
    if(cs){ cs.disabled = false; }
  }
}
function syncSwitch(id){
  const hidden = document.getElementById(id);
  const sw = document.getElementById(id + '_switch');
  if(!hidden || !sw) return;
  hidden.value = sw.checked ? '1' : '0';
}
function setBool(id,v){
  const hidden = document.getElementById(id);
  const sw = document.getElementById(id + '_switch');
  if(hidden && sw){
    sw.checked = !!v;
    hidden.value = sw.checked ? '1' : '0';
    return;
  }
  setSel(id, v ? '1' : '0');
}
function openModal(){window.__trgModal.show()}
function closeModal(){window.__trgModal.hide()}
function pick(o, a, b, d){
  if(o && o[a] !== undefined && o[a] !== null) return o[a];
  if(o && b && o[b] !== undefined && o[b] !== null) return o[b];
  return d;
}
function withToken(path){
  const token = new URLSearchParams(window.location.search).get('token');
  if(!token){ return path; }
  const u = new URL(path, window.location.origin);
  u.searchParams.set('token', token);
  return u.pathname + u.search;
}
function applyTokenToForms(){
  document.querySelectorAll('form[action]').forEach((f)=>{
    const action = f.getAttribute('action') || '';
    if(action.startsWith('/')){ f.setAttribute('action', withToken(action)); }
  });
  const ex = document.getElementById('export_link');
  if(ex){ ex.setAttribute('href', withToken('/trigger_bot/export')); }
}
function fillForm(t){
  document.getElementById('f_id').value=pick(t,'id','ID','');
  document.getElementById('f_title').value=pick(t,'title','Title','');
  document.getElementById('f_match_text').value=pick(t,'match_text','MatchText','');
  document.getElementById('f_response_text').value=pick(t,'response_text','ResponseText','');
  document.getElementById('f_chance').value=pick(t,'chance','Chance',100);
  setSel('f_trigger_mode', pick(t,'trigger_mode','TriggerMode','all'));
  setSel('f_admin_mode', pick(t,'admin_mode','AdminMode','anybody'));
  setSel('f_match_type', pick(t,'match_type','MatchType','full'));
  setSel('f_action_type', pick(t,'action_type','ActionType','send'));
  setBool('f_enabled', !!pick(t,'enabled','Enabled',true));
  setBool('f_case_sensitive', !!pick(t,'case_sensitive','CaseSensitive',false));
  setBool('f_reply', !!pick(t,'reply','Reply',true));
  setBool('f_preview', !!pick(t,'preview','Preview',false));
  applyMatchTypeUI();
}
async function openNew(){
  const r=await fetch(withToken('/trigger_bot/get'));
  if(!r.ok){ alert('Не удалось открыть форму: ' + r.status); return; }
  const t=await r.json();
  fillForm(t); openModal();
}
async function openEdit(id){
  const r=await fetch(withToken('/trigger_bot/get?id='+encodeURIComponent(id)));
  if(!r.ok){ alert('Не удалось загрузить триггер: ' + r.status); return; }
  const t=await r.json();
  fillForm(t); openModal();
}
async function openClone(id){
  const r=await fetch(withToken('/trigger_bot/get?id='+encodeURIComponent(id)));
  if(!r.ok){ alert('Не удалось загрузить триггер для клонирования: ' + r.status); return; }
  const t=await r.json();
  t.id = '';
  t.ID = '';
  const title = (t.title ?? t.Title ?? '').toString().trim();
  const cloneTitle = title ? `${title} (копия)` : 'Новый триггер (копия)';
  t.title = cloneTitle;
  t.Title = cloneTitle;
  fillForm(t); openModal();
}
window.__trgModal = new bootstrap.Modal(document.getElementById('triggerModal'));
document.getElementById('f_match_type')?.addEventListener('change', applyMatchTypeUI);
applyTokenToForms();
applyMatchTypeUI();
</script>
</body>
</html>
